version: '3.8'

services:
  # Backend - FastAPI Agentic RAG
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-assistant-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - JUDGE_LLM_MODEL=${JUDGE_LLM_MODEL}
      - AGENT_DEBUG_ENABLED=${AGENT_DEBUG_ENABLED:-true}
      - NORMATIVE_COLLECTION=${NORMATIVE_COLLECTION:-normative_documents}
      - OPERATIONAL_COLLECTION=${OPERATIONAL_COLLECTION:-operational_content}
      - CHUNKS_DIR=${CHUNKS_DIR:-chunking/enriched_chunks}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_HOST=${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      - ENABLE_LANGFUSE=${ENABLE_LANGFUSE:-true}
    ports:
      - "8880:8880"
    volumes:
      - ./backend/logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-assistant-network

  # Frontend - Vue.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_API_BASE_URL=
        - VITE_TEST_MODE=${VITE_TEST_MODE:-false}
    container_name: ai-assistant-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-assistant-network

networks:
  ai-assistant-network:
    driver: bridge
